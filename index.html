<!DOCTYPE html>

<head>

<title>감정 분류 과제</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f4f6f9; color: #222; min-height: 100vh; }

  .progress-bar { background: #e0e0e0; height: 6px; width: 100%; position: sticky; top: 0; z-index: 10; }
  .progress-fill { background: #3b82f6; height: 6px; transition: width 0.4s; }

  .container { max-width: 740px; margin: 0 auto; padding: 24px 16px 60px; }

  .header { text-align: center; margin-bottom: 24px; }
  .step-label { font-size: 13px; color: #6b7280; margin-bottom: 6px; }
  .header h2 { font-size: 20px; font-weight: 700; color: #1e3a5f; }

  .stimulus-card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 20px 24px; margin-bottom: 24px; }
  .platform-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 12px; letter-spacing: 0.3px; }
  .badge-facebook { background: #e8f0fe; color: #1a56db; }
  .badge-threads { background: #f3e8ff; color: #7e22ce; }
  .badge-x { background: #e8f5e9; color: #1a7f37; }
  .badge-reddit { background: #fff3e0; color: #c05621; }
  .stimulus-text { font-size: 15px; line-height: 1.8; color: #1f2937; white-space: pre-wrap; word-break: break-word; }
  .stimulus-user { font-size: 12px; color: #9ca3af; margin-top: 10px; }

  .rating-block { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); padding: 20px 24px; margin-bottom: 16px; }
  .section-title { font-size: 14px; font-weight: 700; color: #374151; margin-bottom: 14px; padding-bottom: 7px; border-bottom: 2px solid #e5e7eb; }
  .section-title span { font-weight: 400; color: #6b7280; font-size: 12px; }

  /* 감정 버튼 */
  .emotion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .emotion-option { position: relative; }
  .emotion-option input[type=radio] { position: absolute; opacity: 0; width: 0; height: 0; }
  .emotion-label {
    display: flex; flex-direction: column; padding: 10px 14px;
    border: 1.5px solid #e5e7eb; border-radius: 10px; cursor: pointer;
    font-size: 13px; transition: all 0.15s; background: #fafafa; gap: 2px;
  }
  .emotion-label .em-name { font-weight: 700; font-size: 13px; }
  .emotion-label .em-sub { font-size: 11px; color: #9ca3af; }
  .emotion-option input:checked + .emotion-label {
    border-color: #3b82f6; background: #eff6ff; color: #1d4ed8;
  }
  .emotion-option input:checked + .emotion-label .em-sub { color: #6096e8; }
  .emotion-label:hover { border-color: #93c5fd; background: #f0f9ff; }

  /* 슬라이더 */
  .slider-wrap { margin-top: 18px; }
  .slider-row { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
  .slider-labels { display: flex; justify-content: space-between; font-size: 11px; color: #9ca3af; margin-top: 4px; }
  .slider-value { font-size: 16px; font-weight: 700; color: #3b82f6; min-width: 36px; text-align: center; }
  input[type=range] { flex: 1; accent-color: #3b82f6; height: 5px; cursor: pointer; }

  .optional-toggle { font-size: 13px; color: #3b82f6; cursor: pointer; margin-top: 16px; display: inline-block; }
  .optional-toggle:hover { text-decoration: underline; }
  .optional-section { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid #f3f4f6; }
  .optional-section.visible { display: block; }

  .btn-next { width: 100%; padding: 15px; background: #3b82f6; color: white; font-size: 16px; font-weight: 700; border: none; border-radius: 10px; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
  .btn-next:hover { background: #2563eb; }
  .btn-next:disabled { background: #9ca3af; cursor: not-allowed; }

  /* 인트로 */
  .intro-card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; }
  .intro-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 12px; color: #1e3a5f; }
  .intro-card p { font-size: 14px; color: #4b5563; line-height: 1.8; margin-bottom: 8px; }

  .cat-table { width: 100%; border-collapse: collapse; font-size: 12.5px; margin-top: 12px; }
  .cat-table th { background: #f3f4f6; padding: 8px 10px; text-align: left; font-weight: 700; color: #374151; }
  .cat-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; line-height: 1.6; }
  .cat-table tr:last-child td { border-bottom: none; }
  .cat-no { font-weight: 700; color: #1d4ed8; white-space: nowrap; }

  /* 완료 */
  .completion { text-align: center; padding: 40px 20px; }
  .completion-icon { font-size: 56px; margin-bottom: 16px; }
  .completion h2 { font-size: 22px; font-weight: 700; color: #1e3a5f; margin-bottom: 10px; }
  .completion p { color: #6b7280; font-size: 14px; margin-bottom: 24px; line-height: 1.7; }
  .code-box { background: #f0f9ff; border: 2px solid #3b82f6; border-radius: 10px; padding: 16px; font-size: 24px; font-weight: 800; letter-spacing: 5px; color: #1d4ed8; margin: 0 auto 20px; max-width: 260px; }
  .btn-copy { padding: 10px 24px; background: #e0f2fe; color: #0369a1; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 700; }
  .btn-copy:hover { background: #bae6fd; }
  .download-link { display: inline-block; margin-top: 16px; font-size: 13px; color: #6b7280; text-decoration: underline; cursor: pointer; }
</style>

<script>
const STIMULI_POOL = [{"id": 1, "platform": "Facebook", "text": "President Trump's EXACT Tariff Playbook, A Step-by-Step Guide:\nIs the trade war back again with new tariffs over Greenland?\nWe spent 12 months analyzing EVERY tariff development, here's the exact tariff playbook you need.\nPresident Trump announced new tariffs on the EU and confirmed his top strategic priority: the acquisition of Greenland. This includes a new 10% tariff on Denmark, Norway, Sweden, France, Germany, the UK, Netherlands, and Finland beginning February 1st. \nAnd, these tariffs will increase to 25% on June 1st and WILL NOT be lifted until a deal is reached on Greenland. This deal MUST be a \"complete and total purchase of Greenland,\" according to Trump.\nBefore we break down our exact playbook, we must first note that the trade war has become an episodic headwind. Tariffs come ba", "user": "the_kobeissi_letter"}, {"id": 3, "platform": "Facebook", "text": "ട്രംപിന്റെ ഭീഷണികൾ പുച്ഛിച്ച് തള്ളി പെഡ്രോ സാഞ്ചസ്, ശ്രദ്ധനേടി സ്പെയിൻ പ്രധാനമന്ത്രി | Pedro Sánchez\nNo to War\": Spain’s Pedro Sánchez Defies Donald Trump’s Trade Threats\n#PedroSanchez #DonaldTrump #SpainNews #GlobalPolitics #TradeWar #USPolitics #SpainPM #InternationalNews #BreakingNews2026 #Diplomacy #24news", "user": "24_news"}, {"id": 4, "platform": "Facebook", "text": "Blue House closely following Trump's renewed tariff threats\n#TrumpTariffs #BlueHouseResponse #TradeWar #arirangnews #트럼프관세 #청와대대책회의 #한미통상 #아리랑뉴스", "user": "arirang_news"}, {"id": 5, "platform": "Facebook", "text": "Huge escalation in the Iran conflict: President Trump is now cutting off ALL trade with Spain after they refused to let the US use their military bases for strikes on Iran!\nIn fiery White House remarks, Trump blasted Spain as \"terrible\" and \"very uncooperative,\" saying he's instructed Treasury Secretary Scott Bessent to halt all dealings. This comes after Spain relocated 15 US aircraft from joint bases like Rota and Moron, citing they won't support attacks on Iran. Trump also slammed their NATO spending, threatening a full embargo despite trade agreements.\nWith billions in trade at stake (think olive oil, autos, steel), this could shake global markets and NATO alliances. Is this bold leadership or reckless diplomacy?\nWhat do you think, smart move or overkill? Comment below \n#Trump #SpainTr", "user": "mitch_summers"}, {"id": 6, "platform": "Facebook", "text": "TRADE WAR RUMORS SPREAD — NO PROOF U.S. TARIFFS HANDED WHEAT MARKET TO CHINA\nPosts claiming that Donald Trump imposed sweeping tariffs on Canadian grain and that China immediately replaced the United States in the global wheat market are circulating online, but there is no verified evidence that events of this scale have happened.\nTrade in crops like wheat, barley, oats, and canola between the U.S. and Canada is governed by agreements such as United States–Mexico–Canada Agreement, and major tariff changes affecting multiple commodities would normally trigger official announcements, WTO notifications, and immediate reporting by agricultural markets. No such confirmed actions have been reported.\nClaims that China signed $65 billion long-term grain contracts and funded billions in new Canadia", "user": "daily_chill_zone"}, {"id": 7, "platform": "Facebook", "text": "Blue House closely following Trump's renewed tariff threats#TrumpTariffs #BlueHouseResponse #TradeWar #arirangnews #트럼프관세 #청와대대책회의 #한미통상 #아리랑뉴스", "user": "arirang_news"}, {"id": 8, "platform": "Facebook", "text": "Breaking: The European Union threatened to start a trade war with Donald Trump after the US president was accused of “blackmail” over his Greenland tariffs\nhttps://www.telegraph.co.uk/world-news/2026/01/18/macron-threatens-trump-with-trade-bazooka-over-greenland/?WT.mc_id=tmgoff_fb_photo_with-trade-bazooka-over-greenland/", "user": "the_telegraph"}, {"id": 9, "platform": "Facebook", "text": "Europeans are piling into US stocks:\nEuropean investors now own a record $10.4 trillion in US stocks.\nOwnership has surged +$4.9 trillion, or +91%, over the last 3 years.\nDenmark, Finland, France, Germany, the Netherlands, Norway, Sweden, the UK, now hold ~$5.7 trillion in US equities, or 55% of total European holdings.\nBy comparison, the rest of the world holds $10.9 trillion.\nIn other words, European investors now reflect ~49% of all foreign holdings of US equities.\nEurope’s exposure to US stocks is at unprecedented levels despite the trade war.", "user": "the_kobeissi_letter"}, {"id": 10, "platform": "Facebook", "text": "LOOMING TRADE WAR? \nUS President #DonaldTrump on Tuesday threatened to cut off trade with #Spain, whose left-wing government refused to let US planes use its bases to att*ck Iran and objected to raising defense funding as part of NATO.\n\"Spain has been terrible,\" Trump told reporters as he met German Chancellor Friedrich Merz. | AFP \n#DailyTribune", "user": "daily_tribune"}, {"id": 11, "platform": "Facebook", "text": "The bond market will be the ultimate signal:\nOver the last 2 weeks, treasury yields have silently pushed higher.\nSoon, with the US-EU trade war resurfacing, we will see the bond market's initial reaction to the headlines.\nAs seen in April 2025, a sustained push higher in treasury yields is something the Trump Administration does not want to see.\nIf yields continue rising on the back of trade tensions, the bond market could be the signal of a potential pullback on tariffs by Trump.\nThe bond market has a lot of the market's answers.", "user": "the_kobeissi_letter"}, {"id": 12, "platform": "Facebook", "text": "This is absolutely insane:By 2:10 PM ET today, the S&P 500, SPY, $675 strike calls had fallen to a low of $0.02 per contract, effectively worthless.Then, at 3:20 PM ET, President Trump said the Iran war is \"very complete,\" sending the S&P 500 soaring.By 3:30 PM ET, 10 minutes later, these same calls were trading at $4.95 per contract, up +24,650%.In other words, $1,000 invested in these calls at 2:10 PM ET was worth $247,500 just 80 minutes later.We are witnessing historic volatility.", "user": "the_kobeissi_letter"}, {"id": 13, "platform": "Facebook", "text": "BREAKING: President Trump responds to Spain banning the US from using their military bases for strikes on Iran:\nPresident Trump says:\n1. The US is now \"cutting off all trade with Spain\"\n2. He has a \"right to stop everything that has to do with Spain\"\n3. He instructed Treasury Secretary Bessent to \"cut off all dealings with Spain\"\n4. The US \"can use Spain's bases if we want, just fly in and use it\"\n5. The US \"doesn't want anything to do with Spain\"\nIt seems the US has just entered a trade war with Spain.", "user": "the_kobeissi_letter"}, {"id": 14, "platform": "Facebook", "text": "Europeans are piling into US stocks:European investors now own a record $10.4 trillion in US stocks.Ownership has surged +$4.9 trillion, or +91%, over the last 3 years.Denmark, Finland, France, Germany, the Netherlands, Norway, Sweden, the UK, now hold ~$5.7 trillion in US equities, or 55% of total European holdings.By comparison, the rest of the world holds $10.9 trillion.In other words, European investors now reflect ~49% of all foreign holdings of US equities.Europe’s exposure to US stocks is at unprecedented levels despite the trade war.", "user": "the_kobeissi_letter"}, {"id": 15, "platform": "Facebook", "text": "This is absolutely insane:\nBy 2:10 PM ET today, the S&P 500, SPY, $675 strike calls had fallen to a low of $0.02 per contract, effectively worthless.\nThen, at 3:20 PM ET, President Trump said the Iran war is \"very complete,\" sending the S&P 500 soaring.\nBy 3:30 PM ET, 10 minutes later, these same calls were trading at $4.95 per contract, up +24,650%.\nIn other words, $1,000 invested in these calls at 2:10 PM ET was worth $247,500 just 80 minutes later.\nWe are witnessing historic volatility.", "user": "the_kobeissi_letter"}, {"id": 16, "platform": "Facebook", "text": "LOOMING TRADE WAR? US President #DonaldTrump on Tuesday threatened to cut off trade with #Spain, whose left-wing government refused to let US planes use its bases to att*ck Iran and objected to raising defense funding as part of NATO.\"Spain has been terrible,\" Trump told reporters as he met German Chancellor Friedrich Merz. | AFP #DailyTribune", "user": "daily_tribune"}, {"id": 17, "platform": "Facebook", "text": "BREAKING: U.S.–Canada Trade War Explodes — Trump vs Carney Showdown\n।......\nThe United States–Canada relationship entered a major crisis when the Trump administration announced the “Canada Economic Accountability Package” on April 7, 2026. The package imposed a 40% tariff on most Canadian goods, introduced visa restrictions on Canadian officials, added strict financial reporting rules for Canadian companies, and suspended key trade benefits under the USMCA agreement, calling Canada’s use of dispute panels an “unfriendly act.”\nCanadian Prime Minister Mark Carney responded within 43 minutes in a speech to Parliament. Instead of typical retaliation, Canada activated a reserve strategy prepared earlier in the year. The plan included suspending Canada’s funding for NORAD modernization, launchin", "user": "usa_polticsv"}, {"id": 18, "platform": "Facebook", "text": "The bond market will be the ultimate signal:Over the last 2 weeks, treasury yields have silently pushed higher.Soon, with the US-EU trade war resurfacing, we will see the bond market's initial reaction to the headlines.As seen in April 2025, a sustained push higher in treasury yields is something the Trump Administration does not want to see.If yields continue rising on the back of trade tensions, the bond market could be the signal of a potential pullback on tariffs by Trump.The bond market has a lot of the market's answers.", "user": "the_kobeissi_letter"}, {"id": 19, "platform": "Facebook", "text": "The million dollar question: What happens to Silver?\nThis is your reminder that Silver just posted its best year since 1979 during the 2025 trade war, rising +148%.\nBonds have been getting crushed and crypto remains highly volatile, solidifying Gold and Silver as the global safe havens.\nMore uncertainty, less stability, and fragmented global trade are a safe haven trade's best friend.\nAsset owners will keep on winning.", "user": "the_kobeissi_letter"}, {"id": 20, "platform": "Facebook", "text": "Gold futures surged to a record $4,700/oz as trade war tensions escalate.\nGold is now up +78% over the last 12 months in one of its best runs in history.", "user": "the_kobeissi_letter"}, {"id": 21, "platform": "Facebook", "text": "The oil market is moving at an unprecedented pace:\nTrading volume in the United States Oil Fund ETF, USO, jumped to a record $12.4 billion on Monday.\nThis puts volumes up +1,000% since the start of the year.\nThis also surpasses the previous peaks seen during the 2020 oil crash, the 2022 Russia-Ukraine War, and the 2025 spike by over +200%.\nBy 11:30 AM ET yesterday, trading volume was already at an all-time high of $7.6 billion.\nThe surge was driven by a mix of institutional traders and retail investors chasing the oil price move.\nOil is now one of the most traded assets on the planet.", "user": "the_kobeissi_letter"}, {"id": 22, "platform": "Facebook", "text": "The million dollar question: What happens to Silver?This is your reminder that Silver just posted its best year since 1979 during the 2025 trade war, rising +148%.Bonds have been getting crushed and crypto remains highly volatile, solidifying Gold and Silver as the global safe havens.More uncertainty, less stability, and fragmented global trade are a safe haven trade's best friend.Asset owners will keep on winning.", "user": "the_kobeissi_letter"}, {"id": 23, "platform": "Facebook", "text": "War وور، حرب\nCivil War حرب أهلية، سِڨِل وور\n Cold war  حرب باردة ،كولد وور\nTrade war حرب تجارية ،ترَيد وور\nConventional warحرب تقليدية ،كُنڨنشينَل وور\nNuclear war حرب نووية ،نيوكلير وور\nWorld war? ما معنى", "user": "__________________"}, {"id": 24, "platform": "Facebook", "text": "In the years since President Trump’s first trade war with China, Beijing has built an arsenal of tools to hit the U.S. where it hurts. Now, it is getting ready to deploy them in full.  \n: https://on.wsj.com/4jvHonP", "user": "the_wall_street_journal"}, {"id": 25, "platform": "Facebook", "text": "The oil market is moving at an unprecedented pace:Trading volume in the United States Oil Fund ETF, USO, jumped to a record $12.4 billion on Monday.This puts volumes up +1,000% since the start of the year.This also surpasses the previous peaks seen during the 2020 oil crash, the 2022 Russia-Ukraine War, and the 2025 spike by over +200%.By 11:30 AM ET yesterday, trading volume was already at an all-time high of $7.6 billion.The surge was driven by a mix of institutional traders and retail investors chasing the oil price move.Oil is now one of the most traded assets on the planet.", "user": "the_kobeissi_letter"}, {"id": 26, "platform": "Facebook", "text": "President Trump's CONFLICT Playbook, An Investor's Step-by-Step Guide:\nThe Iran war is escalating. We have spent the last 12 months analyzing EVERY geopolitical conflict involving President Trump. What's coming next? Here is our CLEAR guide to what is coming next and what it means for investors and financial markets. Before we begin, Bookmark this Article, it will be your guide to the next 2-4 weeks in the market.\nOn January 17th, we published our first \"playbook,\" which we titled the Tariff Playbook as President Trump ramped up tariff pressures on the European Union amid his push for an acquisition of Greenland. This article ended up predicting the outcome of President Trump's latest tariff war down to the day. So, how did we know?\nSince President Trump's inauguration on January 20th, 202", "user": "the_kobeissi_letter"}, {"id": 27, "platform": "Facebook", "text": "‘China has been here for 5000 years. Most of the time, there was no United States and we survived’China analyst, Victor Gao, say that ‘China will fight to the very end’ in a trade war after President Trump hit China with 145% tariffs.#China #US #Trump #TradeWar #Tariffs #Channel4News", "user": "channel_4_news"}, {"id": 28, "platform": "Facebook", "text": "War وور، حربCivil War حرب أهلية، سِڨِل وور Cold war  حرب باردة ،كولد وورTrade war حرب تجارية ،ترَيد وورConventional warحرب تقليدية ،كُنڨنشينَل وورNuclear war حرب نووية ،نيوكلير وورWorld war? ما معنى", "user": "__________________"}, {"id": 29, "platform": "Facebook", "text": "Spain Defies Trump in Stunning NATO Betrayal: Bars U.S. Bases for Iran Strikes, Invites Trade War\nIn a brazen act of defiance against its most vital NATO ally, Spanish Prime Minister Pedro Sánchez has refused to allow American forces to use joint bases in Rota and Morón for operations against the Iranian regime—leaving the U.S. and Israel to confront Tehran's nuclear ambitions and terror sponsorship alone.\nPresident Trump responded with unmistakable force, vowing to cut off trade with Spain unless it honors alliance commitments and provides logistical support in the fight. Sánchez, undeterred, dug in deeper with a March 4, 2026 national address dripping with pacifist rhetoric and historical revisionism.\nHis defiant core message: **\"No to war.\"**\nKey excerpts from Sánchez's statement:\n \"The", "user": "donald_trump_for_president"}, {"id": 30, "platform": "Facebook", "text": "Sir Keir Starmer condemned Donald Trump as “completely wrong” for igniting a trade war with Britain in an attempt to force a deal on Greenland\nhttps://www.telegraph.co.uk/world-news/2026/01/17/trump-to-impose-tariffs-on-britain-over-greenland/?WT.mc_id=tmgoff_tw_post_tariffs-on-britain-over-greenland/&tmgoff_fb_photo_greenland/?WT.mc_id=tmgoff_tw_post_tariffs-on-britain-over-greenland/", "user": "the_telegraph"}, {"id": 31, "platform": "Facebook", "text": "BREAKING: US Foreign Affairs issues a BOLD warning to world leaders meeting Xi Jin ‘계엄 사과’ ‘윤석열 절연’ 결의문 작성 합의", "user": "salim._.daddy"}, {"id": 119, "platform": "Threads", "text": "이순신이 대통령이었어도\n반국가세력 상대로 계엄 때렸을듯", "user": "wpekdjdjiw32"}, {"id": 120, "platform": "Threads", "text": "좌파들 보면 웃긴 게\n윤석열이 계엄 안 했어도\n민주당 지지했을거면서\n왜 계엄 탓하고 있어?\n좌파에게 계엄은 핑계일 뿐이다.", "user": "yoel____________"}, {"id": 121, "platform": "Threads", "text": "계엄 이후 많은 사람이 알게 된 것들\n한국이 이렇게 중국화 되었다고?\n한국이 이렇게 사회주의화 되었다고?", "user": "shindon_lifeinvest"}, {"id": 122, "platform": "Threads", "text": "이거하나 꼭 기억해.\n윤석열 대통령 계엄 선포 할 때 하신 말.\n‘한 나라의 대통령으로서\n외부 세력으로부터 위협을 받고있는 국가비상사태인 지금, 대한민국의 자유민주주의를 지키고 반국가 세력을 척결하기위한 비상계엄을 선포합니다’", "user": "agnessyeri_"}, {"id": 123, "platform": "Threads", "text": "저는 윤석열 대통령의 파면\n인정 못합니다.\n윤석열 대통령의 계엄,\n이유와 방법 모두 인정합니다.", "user": "shindon_lifeinvest"}, {"id": 124, "platform": "Threads", "text": "12.03 계엄 : 사망자 0명\n음료수 유혹 사망자 : 4명\n이XX 측근 사망자 : 5명\n코로나백신 사망자 : 2100명 이상", "user": "lee_na___"}, {"id": 125, "platform": "Threads", "text": "주식 떨어지니까 신나서 계엄 때가 나았다 어쩐다하는 사람들 있는데 외부, 내부 악재 구분 못함? 떨어지는거 아깝지 속 상하지. 근데 진심 다른 사람들 돈 잃고 기업자산 줄어들고 환율 오르고 나라 망하는게 좋냐? 신이 나서 떠드네 아주. 뭐 코로나때도 이런 장 본적이 없다는데 뭐라는거야 나 여행사 다녔었고 그때 여행사 줄 폐업에 월급 못 받고 퇴직한 사람이 한둘인줄 아나.", "user": "chu._bebe"}, {"id": 126, "platform": "Threads", "text": "계엄 제대로 못해서 나라 반쯤 녹았어 빙신들아. 머리나쁜 딴따라들 감성몰이 프로파간다하는데 니들 그러다 독재자 산하에서 콜로세움에서 사자한테 사냥당하는 오락거리가 될뿐이다.", "user": "hi_ttokki"}, {"id": 127, "platform": "Threads", "text": "이진관 판사:\n계몽령, 경고성 계엄, 서부지법 폭동 옹호 ㅈㄲ.", "user": "raphy.kim"}, {"id": 128, "platform": "Threads", "text": "딸이 광주에 가봤냐고 물어본다.\n자기도 가보고 싶단다.\n회사 일로 가서 기차 시간이 남아\n518기념관에 갔었다.\n518은 정치문제가 아니라 인권문제란 걸 알게되었다.\n.\n착각하지 맙시다.\n123계엄, 내란은 정치문제가 아니에요.\n내란은 뭐다? 인권문제라고요.\n가장 기본적인 인권, 생존권의 문제라고요.\n거기다가 자꾸 정치색 입히지 마라고.\n계엄은 뭐다? 인권침해, 생존권 박탈이라고.", "user": "tumen_kim"}, {"id": 129, "platform": "Threads", "text": "생각해보니..\n윤석열이 계엄 성공해서 영구집권 기반 닦고있었으면\n코스피 6000이니 2500이니가 문제가 아니라\n트럼프가 얼씨구나 하고 반도체 먹으러 정밀타격 했을지도.", "user": "mocha_to_me"}, {"id": 130, "platform": "Threads", "text": "장기집권 위한 계엄였다고?\n국민이 원하는게 사형이라고?\n계엄 해지도 발표한 사람한테 사형?\n국민이 진짜 무엇을 원하는지 나라 팔아먹는 진짜 내란 주동자들은 똑똑히 봐라.\n나라가 미쳐가고. 정의는 죽어간다.", "user": "prayerstory_"}, {"id": 131, "platform": "Threads", "text": "아니 ㅅㅂ 국회를 누가 마비시켰다는거임?\n마비는 반국가세력이 시킨거 아님?\n국회 마비를 시켰으면 국회의원이 어떻게 들어가서 계엄 해제안을 결의함?", "user": "myeol.gong_kumamon"}, {"id": 132, "platform": "Threads", "text": "내가 우리신랑 한테 윤석렬 계엄 이후 당신과 내가 정치적 성향이 달랐다면 이혼했을지도 모르겠다고 말했었다. 우리신랑도 그랬을 거라고 했다.\n저기 밖에서 성조기와 태극기를 흔들며 윤어게인을 외치고 있다는 서로의 모습을 상상하면 피가 거꾸로 쏟는다고 ..\n지금 우리신랑과 나는 반명과 친명에 대한 의견이 일치한다. 반명과 친명이 어디있냐고, 다 민주당 지지자고 다음번에도 또 그다음 번에도 민주진영에서 대통령이 나오길 바라고 그렇게 민주주의가 꽃피우길 바랄뿐이라고 말이다. (다만 민주당내에 김대중과 노무현정신을 제대로 파악하지 못한 분들이 있는건 맞는거 같다는 의견 또한 같다.)\n이번 정권에서 반드시 검찰개혁이 온전히 이루어져 부당하게 기소와 수사가 안 이루어지길 바랄 뿐이라고 요즘 신랑과 나눈 얘기이다.\n요즘은 부부애라기보다 동지애에 더 가까운 것 같다.", "user": "youngkku27"}, {"id": 133, "platform": "Threads", "text": "부정선거토론보고 믿는다는 글에\n관심을 이렇게 보일 줄은 몰랐습니다.\n몇몇분들이 왜 첫글에 이런 글 올리냐?\n선동계정아니냐고 하는데 제 본 계정은\n제가 하는 요식업 홍보하는 계정이라 그런 글은\n못올립니다.\n그리고 저는 국민의 힘 지지자도 아니고요\n계엄 욕하던 사람 입니다.물론 부정선거 안믿었고\n여지 껏 민주당 말에 조금 더 신뢰를 했습니다.\n근데 어제 이준석씨는 음모론 이다 라는 근거를\n제시한 것이 없고 무지성 음모론 취급하던데\n저도 그랬습니다.제대로 된 근거를 보기전까지는요\n수많은 분들이 댓글을 다셨는데요 부정선거 믿는 분들은 나라부터 걱정하시고 깨달아주셔서 감사하다고 하시는 반면 부정선거를 안믿는 분들은\n근거를 이야기 하는 것이 아니라 너도 극우냐 선동이냐 입에 못담을 말들을 내뱉고 보네요.\n저는 부정선거 믿는 분들이 더 나라를 사랑하는 것\n같다고 느껴집니다", "user": "ykke_s"}, {"id": 134, "platform": "Threads", "text": "■ 송언석 국민의힘 원내대표\n▪︎ \"12·3 계엄에 대한 당 차원의 사과·반성 뜻 다시 밝혀야\"", "user": "k_rightwing_voice"}, {"id": 135, "platform": "Threads", "text": "송언석 원내대표님, 이미 작년 12월에 107명 대표해서 진심으로 사과하고 책임 통감한다고 고개 숙이셨잖아요.^^ 그걸 또 다시 밝혀야 한다니 진짜 몇 번 더 해야 속이 후련해지시는 건가요?^^ 계엄 사과 1년에 한 번씩 리사이클하는 거 이제 좀 지겹습니다!^^ 적당히 해주셨으면 해요!^^", "user": "park_tail"}, {"id": 136, "platform": "Threads", "text": "김민석 총리가 옳습니다!! \"저는 대장동 사건, 가덕도 테러, 12.3 계엄, 대법원 파기환송 등의 본질이 같다고 생각해왔습니다. 모두 이재명을 죽이고 민주주의를 죽이려 한 비정상적 시도였습니다.\"", "user": "choi_heejoong"}, {"id": 137, "platform": "Threads", "text": "(YTN 속보 \"계엄 정신적 피해\" 윤석열 상대 시민들 손해배상 승소", "user": "seok_jun_ko"}, {"id": 138, "platform": "Threads", "text": "결론은 장동혁 대표 계엄 사과는 없었다!\n국정 운영에 한 축인 여당으로 대통령을 보필 못한 책임에 사과였다는 것이다!", "user": "wonjin_cho1"}, {"id": 140, "platform": "Threads", "text": "계엄 일어나서 죽거나 다친사람 없는데 뭐가문제냐?\n이재명 음주운전으로 죽거나 다친사람 없는데 뭐가문제임?", "user": "lovewire89"}, {"id": 141, "platform": "Threads", "text": "나 국힘 책임당원인데, 대표의 계엄 사과 부터 시작해서\n.. 요즘 행보가 너무 마음에 안드네.\n지금 탈당 할까 고민중이야. 의견 좀 내줘", "user": "_lovebaro__"}, {"id": 142, "platform": "Threads", "text": "이명박이 ㄹㅇ진짜 지금 시점에서 다시 생각해보면\n좋은면에서든 나쁜면에서든 윤석열보다 훨씬 우위였다..\n무식하게 계엄 일으키고 깜빵가는대신 영리하게 정적들 조졌으니", "user": "lovewire89"}, {"id": 143, "platform": "Threads", "text": "\"매불쇼와 뉴스공장 구독자가 2~3만명 줄었다\" 호들갑 떠는 것들도 있고, \"최욱과 김어준 영향력이 축소됐다\" 비아냥대는 민주당 성향 유튜버들도 있다.\n2~3만 줄어봐야 전체 구독자의 1% 수준이고, 영향력이 축소됐다는 건 어떤 근거에서 나온 말인지 알 수가 없다.\n윤석열 집권, 특히 12.3계엄 이후 유튜브 방송이 호황이다보니, 뿌리없는 것들이 너무 설쳐댄다.", "user": "baiksunmin1"}, {"id": 144, "platform": "Threads", "text": "[단독]계엄 당일 “국회 한번 더 간다”···‘계엄군 헬기 교신’ 전문 입수", "user": "wonseokyeom"}, {"id": 145, "platform": "Threads", "text": "윤어게인들 웃긴점\n공산화 → 못막음(걔들 논리대로면)\n계엄 → 실패해서 감방감\n근데 왜 어게인", "user": "lovewire89"}, {"id": 146, "platform": "Threads", "text": "12.3 계엄 이후\n1년이 훌쩍 넘은 시점에\n내란 성립 여부에 대한 법원의\n첫번째 판결이 나왔다.\n한덕수 징역 23년 선고로\n12.3 계엄은 내란이라것이\n법원의 법적 판단이다.", "user": "got_bruce"}, {"id": 147, "platform": "Threads", "text": "전한길 선생님은\n이재명이 결국 비상계엄을 할 것이라고\n예측하고 계시던데 궁금하다.\n과연 이재명이 계엄을 하면 좌파들은\n어떻게 받아들일까?\n\"계엄\"이라는 단어만 들어도\n그렇게 발작을 떨던 것들이...", "user": "kruger0327"}, {"id": 148, "platform": "Threads", "text": "국힘이 윤통 절연 했다고 엔추파도스 인지 지랄인지 당이라고 국힘 떠나고 버려야 한다는 사람들 많은듯. 윤통이 계엄 할때까지 나라가 어떻개 돌아가는지 관심 없었다고 광고하고 있네. 앤추파도스 뭐 쉽게 얘기하면 국힘내 즉 우파 정당내 뿌락치들 걔네가 최근에 들어온 애들도 아니고 죽 있어왔음. 그럼에도 계속해서 국힘에서 나라 구한 대통령들이 나왔음. 윤석열 대통령님도 그 엔추파도스 국힘에서 나오셨다. 그 보수내 빨갱이 뿌락치들 대한민국 건국초기 부터 있어왔고 90년 3당 합당으로 좌파 뿌스러기 영삼이가 보수정당에 들어 오면서 본격적으로 자리잡기 시작했다. 그리고 그거 보수내의 어르신들 다 알고 계셨고. 그래도 대중이 빨갱이당 보다는 나으니까 계속 끌고 오신거임. 그 덕분에 그때그때 한국에 필요했던 이명박 박근혜 윤석열 이런분들이 나올수 있었고. 국힘 답없는 병신들 인거 맞는데 그래도 원내정당에 세력이 있어야 윤통을 위해 뭐라도 해보지.", "user": "ka_tactical_c"}, {"id": 149, "platform": "Threads", "text": "국힘이 북한, 박정희 팔이로 결국엔 계엄 때리고 망조 들어선것 안보이나? 어려울 땐 검찰개혁 외치고, 권력을 얻으면 자애로와 지시고 스스로 무너지는, 국민의 지지를 엿 바꿔먹는짓을 몇번째인가? 검찰개헉 팔이라는 새로운 지병인가?", "user": "nuruhachi_sb"}, {"id": 150, "platform": "Threads", "text": "계엄 생각해보니 웃음벨인게\n모임 장소가 롯데리아고\n주관자가 성추행으로 옷 벗은 뒤에 무당이 된 퇴역군인\n또 이걸 윤어게인 빨아제끼는 긁우들\n하... 왜 쪽팔림이 엄한 사람들이냐고?", "user": "wantupark"}, {"id": 151, "platform": "Threads", "text": "나는 지금의 사태가 1 찍 때문이라고 한다.\n남편은 지금의 사태가 계엄 때문이라고 한다.", "user": "gimhyejin5239"}, {"id": 152, "platform": "Threads", "text": "계엄 이후로 세상을 보는 눈이 달라졌고\n인간 관계가 정리되기 시작했다.\n눈을 뜨고 보니 나는 평생을 좌파밭에서 살아왔더라…\n주변 지인들은 아직도 대부분 나라가 망해가는 것도 모르고 그저 즐겁고 평온한 일상을 보내는 것이 이젠 화를 넘어서 너무 슬프다.\n계엄은 옳았다.", "user": "sangshow425"}, {"id": 153, "platform": "Threads", "text": "우밍아웃 후\n좌파 친구 잃었다고\n너무 슬퍼하지마세요\n이 지경까지 왔는데\n계엄 왜 했는지 모르면\n지능의 문제입니다\n적어도\n계엄 왜했지? 라는 의문을 가져야 합니다\n상대방의 이야기를 들어보지도 않는 사람과\n함께할 이유는 없어요", "user": "jdeepeterock"}, {"id": 154, "platform": "Threads", "text": "윤대통령은 48%정도의 득표율로 당선됐는데\n계엄 직전엔 (24년 11월) 지지율이 20% 초반까지 떨어졌다. 계엄 직후엔 10-15%\n한미일 안보협력도 잘 맺고, 수출도 역대 최대였고, 자유도 확대하고, 문재인 정부의 사회주의적 통제도 거의다 없앴는데 대체 왜 지지율 떨어진거임????\n대체 사람들이 왜 지지를 철회한건지 궁금하네\n그놈의 디올백이랑 의대정원 때문임?\n문재인 정부에 비하면 선녀지, 왜 지지를 철회하노.\n그때 지지율 40%만 넘었어도 일부 국힘 의원들이 탄핵찬성표 못 던졌을텐데\n있을때 잘하지, 왜 소잃고 외양간 고치노", "user": "exbctv"}, {"id": 155, "platform": "Threads", "text": "이재명 계엄 기원\n제발 계엄 한번만 해봐\n제발~계엄령 선포해줘", "user": "petodol99"}, {"id": 156, "platform": "Threads", "text": "모범택시 시즌3\n군대 나오고\n계엄 모의\n햄버거 회동\n왜 최종화인지 알겠네.", "user": "500summer__"}, {"id": 157, "platform": "Threads", "text": "계엄 이후로 아이유 노래를 듣기 싫어졌다.\n정말 팬이었는데 반쪽짜리 팬들만 챙기는 것에 너무 충격을 받은 탓이다.\n그런데 몇몇 곡은 도저히 끊을 수가 없더라.\n아이유 같은 감성을 내는 가수도 많지도 않고...\n이 조그마한 나라에서 이념 싸움에 놀아나야 한다는게 참 서글픈 느낌도 든다.", "user": "roadzzz_qe"}, {"id": 158, "platform": "Threads", "text": "윤가놈의 12.3계엄을 경고성 계엄 또는 계몽령으로 호도하는 자들이 이 땅에서 있다니 참으로 한심합니다.\n친위쿠데타를 일으킨 권력자는 독재자가 되고, 국민의 생명과 기본권을 심각히 침해되고, 나라는 극심한 혼란 속에 쇠퇴했습니다.", "user": "exerscience_fit"}, {"id": 159, "platform": "Threads", "text": "우파들이 걱정하는 것들 : 물가상승, 증세부담, 경제둔화, 집값상승, 재판중지법, 조국 윤미향 사면, 외국 농산물 수입, 언론통제, 노란봉투법, 기업규제, 젠더갈등 조장, 사법장악, 언론통제, 무비자 중국인 등등\n좌파들이 걱정하는 것들 : “계엄 무섭고 두려워..엉엉 어쩜 그럴 수 있어..\"", "user": "lee_na___"}, {"id": 160, "platform": "Threads", "text": "윤석열의 계엄 사태 이후 친일 유튜버들이 지금까지 쌓아놓은 서사 정리.\n1. 윤석열은 중국에 의한 한국의 공산화를 막기 위해서 계엄을 했다.\n2. 윤석열의 파면을 막기 위해서 한국의 젊은 우파들이 기성세대의 일방적인 반일 교육에 반기를 들었다.\n3. 하지만 파면을 막지 못해서 정권이 바뀌었다.\n4. 정권이 바뀌어 한국은 서서히 중국에 의한 공산주의화 되어가고 있다. (중국인 무비자 입국)\n5. 한국에서 언론은 통제 당하고 있으며 개인 유튜버들도 표현의 자유를 탄압받고 있다.\n6. 다카이치 총리가 중국에 맞서는 모습을 한국인들이 부러워 하고 있으며, 최근 뒤늦게 한국에서도 반중 시위가 확대 되고 있다.", "user": "dragon.833962"}, {"id": 161, "platform": "Threads", "text": "대통령 대국민담화 윤석열 속보 내란죄 계엄 2000명프로젝트 미국일상 스하리 스친 탄핵소추", "user": "newguncar"}, {"id": 162, "platform": "Threads", "text": "정은경, 코로나19 백신 이물질 논란에 \"당시 방역 책임자로서 송구\"", "user": "_jeils_"}, {"id": 163, "platform": "Threads", "text": "계엄 사망자 : 0\n코로나백신 사망자 : ??\n살인자들아", "user": "gahn7x3"}, {"id": 164, "platform": "Threads", "text": "正在回复@banhongsitv\n증거가 아니라 근거라고 하는거고 당안의 사정을보면 근거들이 보입니다. 간단한걸 어렵게 보지마시고 본인 생각이 그렇다면 그렇게 믿고 행동하시면됩니다.", "user": "number1seoha"}, {"id": 165, "platform": "Threads", "text": "장동혁과 국힘이 계엄 사과하고 윤 절연한 증거는 수두룩합니다. 증거와 결과를 보고 판단하셔야지 희망 품으며 잘못된 판단 하고 있다는 사실을 모르시네요. 정치는 믿음의 영역이 아닙니다.", "user": "banhongsitv"}, {"id": 166, "platform": "Threads", "text": "윤석열 뉴스 정치 탄핵소추 침묵 계엄 계엄해제 스하리 미국일상 1000명프로젝트 내란죄", "user": "newguncar"}, {"id": 168, "platform": "Threads", "text": "계엄 선포는 내란죄는 아니나, 국회를 탄압할 명백한 의도가 있어 내란죄가 성립한다 ㅋㅋㅋ", "user": "javadeveloperzz"}, {"id": 169, "platform": "Threads", "text": "right_mind_2\n2,747\n108\n111\n28", "user": "blessing_boaz_1942"}, {"id": 170, "platform": "Threads", "text": "계엄에는 불법이라는 단어가 붙을수 없다.\n계엄 발동권한이 대통령에게만 있는 초법적 권한이기 때문이다.", "user": "acelification"}, {"id": 171, "platform": "Threads", "text": "장동혁 계엄사과로 인한 결과\n1. 보수분열\n2. 국힘 탈당러쉬\n3. 민주당 기세등등\n4. 윤통 재판 선고 결과 불리해짐\n5. 보수분열\n6. 서해 중국에 팔아먹은거 묻힘\n7. 보수분열\n도대체 계엄 사과\n왜 한거임 ㅅㅂ ㅅㅐ1끼야 ?", "user": "borum_2ee"}, {"id": 172, "platform": "Threads", "text": "이래도 전략임? 같은 편이 계엄 잘못됐다고\n낭떠러지로 밀면 이렇게 되는거 불보듯 뻔한 결관데\n국힘지지하는 병신들 진짜 윤어게인 팔이 하지 마라", "user": "ilililo3o"}, {"id": 173, "platform": "Threads", "text": "개쓰레기 정당 국힘당아\n이게 너희들의 사과에 대한\n결과다", "user": "bagtaehun191"}, {"id": 174, "platform": "Threads", "text": "12.3 계엄은 위헌이고 윤석열은 대통령에 탄핵당할만한 일을 했음.\n이 간단한 명제를 왜 극우는 이해를 못하지?", "user": "gyeoungju._.0926"}, {"id": 175, "platform": "Threads", "text": "계엄 자체가 위헌이면 계엄제도를 왜 만들어놓은건지 설명해봐. 뭔설명할지도 난 뻔히아는데 그 답에 반박까지 할자신있으니깐", "user": "ato_js"}, {"id": 176, "platform": "Threads", "text": "우와 진짜 대한민국은 망했구나...\n다들 물어뜯고 헐뜯는데에만 혈안이 켜졌네.\n난 솔직히 범죄를 저지르면 감옥에 가서 벌을 받아야 한다 생각해! 근데 ㅇㅈㅁ은 왜 벌을 안받아?\n그리고 대체 윤석열은 뭘 잘못한거야?\n계엄? 그건 정당한거였잖아.\n중국의 소도시가 돼서 공산당이 되고 싶었던거야?\n난 그럴바엔 미국의 소도시가 되고 싶어.", "user": "13608yl"}, {"id": 177, "platform": "Threads", "text": "검찰개혁\n정부안 보면\n검찰청이 폐지되면\n검찰총장 명칭도 없어져야\n마땅 근데\n공소청으로 하면서\n공소청 대가리는 그대로\n검찰총장으로 불린다네\n뭐야\n계엄 일으켜 헌재에서\n대통령 파면 시켰는데\n현재 대통령 이름은\n그대로 룬이야\n내가 비약이 심했나\n딱 니들이 그래", "user": "akdong1897"}, {"id": 178, "platform": "Threads", "text": "내가 궁금해서 물어보는데 좌파우파ㅜ다 상관없어. 대통령 계엄 발동하고나서. 국회에 즉시 통보 안했다고 발작했잖아?? 하나만 물어보자 통보도 안했는데 해제는 어떻게 한거야?? 통보는 서신이나 팩스 공문. 전신 뭘로 받아야 한다고 법에 나와있는건가?? 방송으로 전세계가 다 보도록 알렸는데 그건 통보가 아니라면서. 통보도 안온 계엄령을 어떻게 해제한거야??", "user": "pctiger2"}, {"id": 179, "platform": "Threads", "text": "계엄, 왜 했을까 (4)\n우리모두 나라를 위해 기도해요..", "user": "seedrain_2"}, {"id": 180, "platform": "Threads", "text": "극우들 이젠 하다하다 츄까지 건드네 걍 답이 없네 아니 그렇게 계엄 좋으시면 북한 가시라고요", "user": "hansh0709"}, {"id": 181, "platform": "Threads", "text": "1. 계엄, 윤대통령과 절연하잔다. 이해가 안된다.\n계엄해제는 이미 1년전에 됐고,\n윤대통령은 대선기간에 탈당했다.\n더구나 장대표는 계엄해제에 찬성표를 던졌다.\n무엇을 더 어떻게 하자는것인지?", "user": "prof.kimmeengeon"}, {"id": 182, "platform": "Threads", "text": "아니 근데ㅋㅋㅋㅋㅋ\n선거위원회에서 받침대만 투명색으로 바뀐거 개웃기네\n부정선거를 주장하는 이유\n우리 보통 선거하면 도장 찍고 도장찍은거 안보이게 2번 정도 접잖아요\n근데 작년 대선 때 빳빳한 종이들만 나온거 알아요?\n그게 말이 되나요?ㅋㅋㅋ\n투표장에는 분명히 접어서 넣어달라는 문구가 곳곳에 붙여있거든요^^\n근데 이번에 받침대만 투명한 색으로 한게 너무 웃긴데\n그렇게 하는게 더 부정선거가 음모론이 아님을 증명하는 샘이지\n그리고 제가 계몽된 건 계엄 이후가 아니라\n우한폐렴 때였어요 자국민은 안챙기고 중국인만 챙기는 정부가\n너무 싫어졌어요...왜 우리가 마스크를 년도에 맞춰서 정해준 갯수대로 구매해야 하고 통제를 당해야 하는지..\n그 때부터 저는 계몽되어 지금도 꾸준히 걸어가고 있습니다\n멸공", "user": "chosm1468"}, {"id": 184, "platform": "Threads", "text": "좌파들의 얘기중 이해 안되는 논리\n계엄=내란\n왜 내란인지 설명해보라고 하면 적법한 절차를 지키지 않았다고 함\n국무회의 증거 나오고 한덕수가 헌재에서 위증했다고 자백한걸 보여주면 헌법을 얘기하며 욕함\n헌법에 행정부의 마비 기능시 대통령 고유권한으로 계엄을 할 수 있다는걸 얘기해주면 그런게 어딨냐함\n찾아서 보여주면 뭐가 행정부의 기능이 마비됐냐고 물음\n민주당의 줄탄핵쇼를 보여주면 그게 왜 행정부의 기능이 마비된거냐라고 또 물음\n이유 설명해주면 그게 뭔 개소리냐고 함\n입씨름을 길게 하다 나오는 결론\n계엄이 왜 내란인지 이유를 못들음\n물론 모든 좌파분들이 그런건 아니겠지만 대다수가 이렇게 얘기함\n계엄이 왜 내람인지 설명해주실 좌파분ㅠㅍ", "user": "woni_seo_00"}, {"id": 185, "platform": "Threads", "text": "오늘부터 분당 수내동 롯대백화점 폐점\n그린동 지하2층\n폐점 라스트 세일한데!", "user": "kinialumi_official"}, {"id": 186, "platform": "Threads", "text": "계엄 내란 이라는 말 하나로 대체 몇 년을 우려먹고\n얼마나 군 지휘체계를 흔들고 싶은건지 감도 안온다 ㅋㅋ", "user": "73zuzu"}, {"id": 187, "platform": "Threads", "text": "쓰레드 보니까 이제는 하다 하다\n윤카 계엄 이후 계몽파 vs 레카 이후 계몽파\n로 갈라치기 하던데 ㅋㅋㅋㅋㅋㅋㅋ\n탈당을 하던 입당을 하던 자유아님?\n알아서들 각자 싸웁시다.", "user": "lee.09.15"}, {"id": 188, "platform": "Threads", "text": "이재명이 2시에 X에 올린 글을 봤다. 정부안에 대해 내가 뭘 대단히 잘못 아는 것인가? 그런데 추미애, 김용민, 박은정은 왜 저러지? 유시민이 대통령이 되어서 검찰의 힘을 사용하고 싶을텐데 어떻게 하겠냐고 물었을 때, 뭐라 답했지? 대통령 선거에서 한 말은 또 뭐고....\n하... 박근혜 당선, 윤석열 당선, 윤석열 계엄 선포 이후로 정치 사안으로 이 시간까지 잠못드는 건 처음이다. 배신감에 잠을 이루지 못하겠다.", "user": "jbxlfmmnt"}, {"id": 189, "platform": "Threads", "text": "석열이 계엄이 불법인 이유!!\n어떤 인간들이 왜 대통령 계엄이 불법이냐 그러면 헌법에 왜 있냐 헛소리들 하면서 궁금하다는데, 진짜 몰라서 그러는거냐 듣고싶은 것만 듣고 믿고싶은 것만 믿는거냐??\n잘 들어 알려줄게!!\n대통령이 계엄 선포할 수 있고 그게 헌법에 명시되어 있지만 전시, 사변 또는 이에 준하는 국가비상사태에 한해 또는 사회질서가 극도로 교란되어 행정 및 사법 기능이 현저히 곤란한 경우 선포할 수 있으며 선포하고나 변경하고자 할 때는 국무회의 심의를 거쳐야 한다.\n그걸 안해서 불법내란인거다!!", "user": "piraonolje"}, {"id": 190, "platform": "Threads", "text": "난 이재명이 참 좋다\n계엄 당시 놀라 숨을 고르던\n이재명의 표정을 참 좋아한다\n.", "user": "petodol99"}, {"id": 191, "platform": "Threads", "text": "[속보] 지귀연, \"장기간 계엄 준비는 아냐, 증거 부족\"", "user": "ac_tactics"}, {"id": 193, "platform": "Threads", "text": "이거 국민들 개돼지로 보는 거 맞죠?", "user": "banhongsitv"}, {"id": 194, "platform": "Threads", "text": "그냥 선관위라는 조직이 조금이라도 수사 성역화 된 것부터가 말이 되고 그 사실 자체로 민주주의는 위협받고 있다고 r)", "text": "종합특검 “계엄 당시 합참 관계자 입건·출국 금지”\n\n3대 특검팀(내란·김건희·순직해병) 이후 남은 의혹을 수사하는 2차 종합특검팀(특별검사 권창영)이 김명수 전 합동참모본부 의장 등 합참 관계자를 출국금지 조치하고 수사에 착수했다.\n\n김지미 특검보는 11일 오후 경기 과천 소재 특검 사무실에서 첫 브리핑을 갖고 \"합참 관계자를 입건해 출국금지 조치하고 수사 중\"이라고 말했다.\n\n출처: freeuniv\n 뉴스1 \n 뉴스1", "user": "jake__L_"}, {"id": 220, "platform": "X(Twitter)", "text": "항상 중요한 시기에 분열을 일어나게 만든 원인 제공자는 항상 국짐과 장동혁이었음. 이건 명백한 사실. 윤통 선고 몇일전에도 엠파추도스 국짐 장씨가 계엄 사과했죠. 사실 장씨 지가 뭔데 계엄을 사과해? 계엄은 대통령의 고유권한인데. 국짐 바지사장 장동혁씨 계엄사과와 윤통절연 효과", "user": "jrainbowcat"}, {"id": 221, "platform": "X(Twitter)", "text": "음... 지금 우리나라 상황을 제대로 보고 그런 얘기를 하시는지... \n윤대통령님의 계엄 목적이 부정선거 입니다!", "user": "lala1983k"}, {"id": 222, "platform": "X(Twitter)", "text": "진짜 이 말 하나가 그렇게 어렵나\n백번 양보해서 계엄 사과했다 쳐\n그 뒤에 “그러나 계엄을 할 수 밖에 없도록 대통령의 손발을 묶고 국무위원을 줄줄이 탄핵해 행정부를 마비시킨 의회폭거를 강력히 규탄한다” 이 말을 왜 못하냐고", "user": "pisces0925"}, {"id": 223, "platform": "X(Twitter)", "text": "윤어게인 너무 단순무식해\n윤석열이가 계엄군 움직여 선관위 털고\n국회 막고 법원 침탈하고 뭐 이딴 뻘짓거릴 뭐라고 하냐면\n독재\n그딴 미친 계엄 쉴드친다면 자유 민주 국가의 일원이 될 자격이 없지\n저딴 뻘짓거리 한 윤석열이란 놈이 또 정치판에 복귀?\n더럽게 미친 종족들이 아니면 제발 좀 아닥~~", "user": "sophos3000"}, {"id": 224, "platform": "X(Twitter)", "text": "국힘 의원들 절윤 선언, 지켜보겠어!  국민이 심판하고 헌재가 결정하고 법원이 선고, 윤석열 내란 우두머리의 계엄은 내란임을 확실히  윤어게인 주장하는 인물을 국힘에서 축출  부정선거 주장하는 자는 해당 행위로 보고 징계 등 후속 조치 없다면 선거 앞두고 국민에게 또 거짓말하는 것!", "user": "JongwookKi26690"}, {"id": 225, "platform": "X(Twitter)", "text": "한동훈 ＂국힘, 尹정치복귀 아닌 계엄 옹호·부정선거 음모론 반대해야＂\n\n얘는 입 다물고 있어야 할 때를 잘 모른다.\n\n국힘 내부에서 절연하려는 애들이 활동하길 바라면 좀 내비둬라.\n\n장동혁 2선 후퇴 요구 목소리도 있는데 니때매 묻히잖아.naver.me/GbyTUtNf", "user": "Raley_1221"}, {"id": 226, "platform": "X(Twitter)", "text": "[속보] 종합특검 ＂계엄 당시 합참 관계자 내란 혐의 입건·출국금지＂ (출처 : 네이버 뉴스)naver.me/G3vIKTGO", "user": "rnralsdusrma12"}, {"id": 227, "platform": "X(Twitter)", "text": "역시 종합특검입니다.\n먼지 한똘도 남기지 마시고 계엄 끝장 해 주십시오.", "user": "AxK2sbhNszGnoXH"}, {"id": 228, "platform": "X(Twitter)", "text": "v.daum.net/v/202603111227007…허무맹랑한 카더라 확증편향에 젖은 코인\n빨이 유튜버 놈에게 판 깔아 줘서 국민주권정부 흠집, 대통령에게 위해 가하려 한 이 개새끼는 같은  진영도 아닐 뿐더러 숨통 끊어지기 직전인 Korea7"}, {"id": 239, "platform": "X(Twitter)", "text": "[속보] 종합특검 \"계엄 당시 합참 관계자들 내란 혐의 입건…출국금지\"\n\n와 미쳐 돌아간다", "user": "gokoreaforkorea"}, {"id": 240, "platform": "X(Twitter)", "text": "계엄 성공했으면 그 담날 바로 찬양문 썼겠지?", "user": "Whateve77820922"}, {"id": 241, "platform": "X(Twitter)", "text": "윤석열은 무책임의 근본이고 문재앙 수사도 안했고 구속도 안시켰어 \n그리고 총선도 진 마당에 특활비 이런 거 다 묶이니 보수 멸공 정신 이용해서 계엄 한거 같거든 그리고 애초에 문재앙 잡아넣으라고 대통령 된건데 한 게 아무것도 없자나 궁지에 몰리니 보수를 이용한거지 아님 궤멸시킬려고 문재앙이 보낸 쁘락치 같아", "user": "a33538443"}, {"id": 242, "platform": "X(Twitter)", "text": "[속보] 종합특검 \"계엄 당시 합참 관계자 입건·출국금지\"news.tvchosun.com/site/data/…", "user": "TVChosunNews"}, {"id": 243, "platform": "X(Twitter)", "text": "[속보] 종합특검 ＂계엄 당시 합참 관계자 내란 혐의 입건·출국금지＂ (출처 : 네이버 뉴스)naver.me/51ucfY7q", "user": "rnralsdusrma12"}, {"id": 244, "platform": "X(Twitter)", "text": "계엄 따른 공직자 전부 포상하여야 한다. 현재 정권은 역적들이다. 정권 바꿔서 극형에 처해야 한다.", "user": "koco62kr"}, {"id": 245, "platform": "X(Twitter)", "text": "생각해보면 그리 깨어있는 사람인 척하던 김어준 계엄 때 라이브도 안하고 도망쳐서 숨어 있던 것도 음흉하게 느껴짐. 콘서트인가 에서 문재인하고 형님 아우 이런 것도 역겹고. 누가 뭐라해도 윤석열은 문재인이 만든 거다. 문재인 아니었으면 이재명도 없다고 하는 것들 생각 다시 똑바로 하길.", "user": "lovingu0304"}, {"id": 246, "platform": "X(Twitter)", "text": "한덕수 항소심 첫 재판 \"尹 고집에 설득…계엄 정당화 아냐\"yna.co.kr/view/AKR2026031109…", "user": "yonhaptweet"}, {"id": 247, "platform": "X(Twitter)", "text": "[속보] 종합특검 \"계엄 당시 합참 관계자 내란 혐의 입건·출국금지\"yna.co.kr/view/AKR2026031110…", "user": "yonhaptweet"}, {"id": 248, "platform": "X(Twitter)", "text": "김명수가 괜히 벼락출세한 게 아니다.v.daum.net/v/202603110949134…", "user": "homo_esperans"}, {"id": 249, "platform": "X(Twitter)", "text": "[단독] 김명수, 곽종근·이진우에게 \"계엄 사무 우선할 것\" 명령‥내란 혐의 입건\n\n이 인간 이럴줄 알았지.\n썩은 인간", "user": "yellowknife000"}, {"id": 250, "platform": "X(Twitter)", "text": "이 잉간 빨리 조사하고 합참 압색하라꼬 내가 처음부터 여러번 말했고, 특히 이 잉간은 계엄 뿐만 아니라 외환유치에도 관련되어 있으니 철저히 수사해서 아작내야 한다 닝기리", "user": "JamesCh22367033"}, {"id": 251, "platform": "X(Twitter)", "text": "◾#123내란공범_김명수('67 TK김천-海士43기) \n   계엄명령 \"곽종근·이진우 계엄 사무 우선하라\"#사형추접스런#토왜매노반골개쓰레기 새끼들. 카~악! 퉤퉤퉤 ": 275, "platform": "X(Twitter)", "text": "윤통 탈당\n계엄 사과\n절윤 선언\n이때마다 어김없이\n국힘은 지지율 빠지고 자중지란\n\n핵심층이 균열되면 외연확장도 안됨 \n\n민주당이 국힘 생각해서 \n절윤을 강요하는 게 결코 아닌데\n국힘은 2중대라 \n싸울 의지도 없음 \n \n이미 대선당일날 국힘은 압승했는데 \n독재치하에서 \n절윤은 민주당만 유리한..", "user": "no_Mouseland"}, {"id": 276, "platform": "X(Twitter)", "text": "류근\n\n추빠라고 몇번을 더 말해야 하냐고요!\n\n김어준씨가 12.3 계엄 밤에 도망쳤다고 조롱하고 욕하는 사람들 보면 실소를 금할 길 없습니다. 최소한 70~90년대 군부독재 시대에 짱돌 한 번을 만져본 적 없는 자들임을 자수하는 거지요. 똑같은 논리라면 그 시대에 수배 떨어진 분들이 현장을 버리고 도바리(도망)친 게 다 비겁한 게 됩니다. 그때 숨어 산 우리 동료들이 다 비겁한 사람들인가요?\n\n암살에 대한 구체적 제보가 있고, 다 아시다시피 젤 먼저 딴지건물(여론조사 꽃)과 자택에 특수부대가 달려오는 와중에 당신 같으면 날 잡아잡수~하고 그들에게 투항하시겠습니까? 여의도로 달려갑니까? 그게 용감하고 정의로운 건가요?\n\n김어준 욕하는 자들이 젤 먼저 비아냥거리는 게 그날 도망쳤다는 건데... 그래서요, 그날 그놈들 내란이 성공해서 수만명 죽는 자리에서 젤 먼저 죽었으면 속이 시원한가요? 진짜 비겁하거나 사악한 사람들이 젤 먼저 대가리 들고 스멀스멀 기어나오는 거 토할 거 같습니다. 김어준은 최소한 노무현 대통령 서거 이후에 지금까지 대중들의 총알받이였다는 사실을 잊으시면 안 됩니다. \n\n제가 이렇게 말하면 저한테 \"친목질\"한다고 또 비아냥거려요. 어이가 없어서 웃음도 안 나옵니다. 저는 지난 3년 간 김어준과 개인적으로 대화한 게 딱 한 마디입니다. 그가 국회 증인 출석하는 날 아침에, \"몸 조심 하세요!\" 딱 한 마디 했습니다. 방송시간 외에 그와 말한 적이 없어요. 그 뿐인가요? 저는 제가 출연하는 겸공도 두어 번 보고 난 후 본 적이 없어요. 그 뿐인가요? 저는 정치 관련 유튜브 자체를 아예 보질 않습니다. 아아. 진짜? \n\n진짭니다. 정치 관련 유튜브 자체를 안 봐요. 우연히 보이는 숏폼만 봐도 대가리가 썩을 것 같습니다. 그 시간에 차라리 니체를 읽습니다. 토리노의 말을 껴안고 우는 니체의 슬픔을 읽는다고요! 위험한 시절에 꿀이나 빨다가 세상 안전해지자 별안간 \"뉴이재명\" 간판 들고 스멀스멀 바퀴벌레처럼 기어나와서 뒤통수 총질하는 OOO 같은 기회주의자", "user": "wpdlatm10"}, {"id": 277, "platform": "X(Twitter)", "text": "가끔 그런 상상을 해봄, 윤이 계엄 성공해서 저 인간 끌고 가면서 가발이 덜렁덜렁거리면 얼마나 웃길까... 하는 생각 ㅋㅋㅋ", "user": "itaehun293170"}, {"id": 278, "platform": "X(Twitter)", "text": "여론조사 대상부터 조작\n언론에서 조작된 여론 띄우기\n국민들이 정책과 투표 결과를 의심치 못하게 함\n\n윤카 계엄 때 여심위도 털었던 이유.", "user": "sts1124"}, {"id": 279, "platform": "X(Twitter)", "text": "“불법 계엄 꿈도 못 꾸게”…우원식, 지선 개헌투표 제안 [지금뉴스] (출처 : 네이버 뉴스)naver.me/GGGVNdeB", "user": "Jageu42"}, {"id": 281, "platform": "X(Twitter)", "text": "국힘이 왜 절윤 했을까?? 선관위 들어갔으면 증거라도 있어야 하는데 없자나아무것도 없으니 추운 겨울에 국민들 싸우는데 관저에서 SNS질만 했지\n고성국 이영돈 등 부정선거에 혹해서 계엄 했던지 보수궤멸이 목적이던지 무슨 생각이지? ㅅㅂ 문재앙 잡아넣으라고 대통령 됐으면서 문재앙도 못잡고 보수만 죽어나네", "user": "a33538443"}, {"id": 282, "platform": "X(Twitter)", "text": "'잘못된 계엄'은 또 뭔데 '올바른 계엄' 이었으면 사과 안 했을 거냐", "user": "sugobat"}, {"id": 283, "platform": "X(Twitter)", "text": "[단독] 계엄 당시 합참 지휘부에 '부하들 못 말린' 책임 묻는다 (출처 : 네이버 뉴스)naver.me/xM5PkTxa", "user": "KingGodChilla"}, {"id": 284, "platform": "X(Twitter)", "text": "이념 전쟁에서 패한 애국 세력은 이제 방법이 없음. 좌익 촛불을 민심으로 착각하고 아침이슬 부르며 눈물 흘린 이명박이나 법치 믿다 탄핵당한 박근혜나 그것 다 보고도 배운 것 없이 오히려 삐리리 계엄 실패로 좌익에 정권 넘겨 나라를 재기 불능으로 만든 윤석열이나 윤빠 수준에 뭐 남은 것 없음.", "user": "mark_shim"}, {"id": 285, "platform": "X(Twitter)", "text": "현대 한국 정치에서 내란 음모 사건들.\n1960년대 한국독립당 내란 음모 조작사건.\n1980년대 전두환 등 신군부가 김대중 내란 음모 조작 사건.\n2013년 통합진보당 이석기 내란조작 사건.\n2017년 기무사 조현천 사령관의 계엄 문건 작성한 내란 음모 사건.\n2024년 12월 윤석열 내란 우두머리 사건.", "user": "leesk0104"}, {"id": 286, "platform": "X(Twitter)", "text": "이런 걸 부실선거 타령하며 \n본질을 덮어준다면 \n민주당 선관위 도와주는 격밖에 안된다 \n\n부정선거 ㅡ 계엄 ㅡ 윤어게인은 한 궤도에 올라타 있으니\n\n민주당이 그 모든 걸 한큐에 보내고 싶어하는 건 당연하지 않나 \n\n나는 \n\n부정선거 눈감은 중도보다 \n부정선거 맞서는 윤어게인편이다 \n\n지금은", "user": "no_Mouseland"}, {"id": 287, "platform": "X(Twitter)", "text": "윤석열 대통령이 계엄을 한 이유⑤youtube.com/shorts/zDOA8ivsY…via@YouTube부정선거 증거", "user": "yagooking"}, {"id": 288, "platform": "X(Twitter)", "text": "비상계엄선포는 잘못된 방법론이었음. 비상계엄선포 안 했어도 어차피 탄핵 당했을 거라고? 그렇게 되었다 해도 지금처럼 최악의 상황이 되지는 않았을 거임. 국회가 다른 이유로 탄핵안 발의 했다면 명분이 없어 가결시키기도 어려웠고 헌재가 인용할 명분도 없었음. 그 과정에서 비상 계엄 선포로 계몽된 사람들보다 더 많은 사람들이 거부감 없이 계몽될 수도 있었을 거고. 어차피 해제할 계엄이었다면 긴급 대국민 담화 발표 정도로 마무리 했어도 충분. 마지막 명분이 선관위 수사 이거 하나인데 진짜 그게 명분이었다면 이렇게 허술하게 해서는 안 되는 거였고. 차분하게 돌이켜 보면 이해가 안 되는 부분이 너무 많음. 국제\n부정선거 카르텔 해체를 위한 미국과의 공조가 아니었다면 걍 이건 미친 짓이었음.", "user": "Vigilante_Aiden"}, {"id": 289, "platform": "X(Twitter)", "text": "민주당이 \n계엄 내란몰이 + 윤어게인 극우몰이 \n지들 독재하려고 이러는 건데 \n\n같이 손발맞춰서 \n계엄 사과해라 + 절윤해라 이런다고 \n국힘 지지율 올라가고 x\n중도 확대 x \n\n그럴수록\n국힘은 내분 초래 약해짐\n\n중도가\n부정선거 부정하면서\n그런 훈수질은\n역효과\n\n조작질로 수치 올려주면 뭐하냐고?", "user": "no_Mouseland"}, {"id": 291, "platform": "X(Twitter)", "text": "빅데이터 예전에 계엄 옹호하는거 보고 차단. 부정선거가 어쩌고...참나..", "user": "Rock09822253"}, {"id": 292, "platform": "X(Twitter)", "text": "계엄 이후 국민의힘 의원 전원이 사과하고 “윤 어게인 반대” 결의문을 내는 데 15개월이 걸렸다. 그 사이 국힘은 ‘역사 가해자’ 프레임에 스스로 갇혔고 일부는 여전히 허우적대고 있다.", "user": "zerovity"}, {"id": 293, "platform": "X(Twitter)", "text": "12·3 계엄 때 총을 든 군인이 국회에 진입하는 장면을 전 국민이 생중계로 봤다. 44년 전 ‘계엄군 트라우마’를 떠올릴 수밖에 없다. 집단 트라우마는 가해자·피해자의 정치 갈등으로 재생산되는 데다 세대를 넘어 전승되기 때문에 오래가고 치유도 어렵다.", "user": "zerovity"}, {"id": 294, "platform": "X(Twitter)", "text": "윤어게인은 2030의 시대정신. 정당을 넘어서는 민족연합체 만들어야.\n\n사회적 관성은 일단 방향을 정하면 되돌리기 어렵다. 사회운동이나 정치 결사체에서 방향 설정이 최우선 과제인 이유다.\n\n국민의힘당이 의총에서 윤석열 전 대통령과 결별을 결의한 것은, 계엄 선포의 본질인 부정선거•입법 독재•사법 정치화를 외면하고, 기득권 수호를 첫 번째 어젠다로 삼은 처사다. 게다가 만장일치 의결이라면 국민의힘당은 이제 협력의 대상이 아니라 척결 대상이라는 현실을 인정해야 한다.\n\n이제 아스팔트 집회와 행진을 주도한 윤어게인 청년들은 스스로를 장외투쟁 세력으로 치부하지 말고, 정당정치를 뛰어넘는 혁명세력으로 인식해야 한다. 정당을 초월한 민족 연합체를 목표로, 조직화와 메시지 전달에서 나아가 제 2의 4·19 혁명을 통해 국회 해산과 공정한 재선거를 최종 목적지로 삼아야 한다.\n\n윤어게인은 2030 청년들의 시대정신이다. 윤 대통령의 계엄 이후, 정의와 공정을 부르짖는 청년들의 집단의지는 하나의 사회적 관성이 되어 국민의힘당과 이미 다른 방향으로 나아가고 있었다. 국민의힘당과는 애초에 방향성이 달랐다.\n\n대한민국 2030 청년들의 윤어게인 요구는 20년 넘게 부정선거를 은폐해 온 타락한 정치인들이나 이들을 대변하는 메이저 유튜버들이 간섭할 사안이 아니다. 정치판에 기생하며 사회적 지위와 돈을 원하면 계속 국민의힘당에 남아 그들의 대변자 역할을 하면 된다. \n\n반면 공정과 정의를 원하는 윤어게인 당원들은 이제 국민의힘당과 절연을 하고 나와 정당을 뛰어넘는 민족연합체를 만들어야 한다.", "user": "Alfredbexus"}, {"id": 295, "platform": "X(Twitter)", "text": "적을 알고 나를 알아야 백전 백승이고 이재명의 적이 김어준이면, 계엄 발표 직후 제일 먼저 김어준한테 전화한 이재명 대통령은 김어준한테 '나좀 잡아가줘' 이런거야?", "user": "siznd34389a"}, {"id": 296, "platform": "X(Twitter)", "text": "계엄날 도망간 런어준이..? 계엄 알아낸건 김민석인디요?", "user": "ZhusikUP"}, {"id": 297, "platform": "X(Twitter)", "text": "12.3 계엄 다음날 모두가 맨붕에 빠져있을 때, '민주당이 내란이다'라는 메시지를 낸 것이 그C입니다. 저도 윤대통령이 그립습니다. 하지만 대안없이 분열하면 이와 한만 좋은 일 만들겁니다.", "user": "nwsung"}, {"id": 298, "platform": "X(Twitter)", "text": "윤싫은 주기적으로 에유에서 혁명안하면 죽는병있나요? 당신들굥 계엄 전까지만 해도 폭주에유 하고있었다며.....", "user": "NNN1757855"}, {"id": 299, "platform": "X(Twitter)", "text": "대놓고 왜 여성의날 중국 여성 붐업하냐고 그러죠 ㅋㅋㅋㅋ\n그전엔 외국 나가서 의리 넘치는 중녀랑 다니라고 바이럴 오졌답니다 ㅎㅎ\n\n저는 그 미드 뉴스룸 대사가 아직도 기억나요. 어떤 문제를 해결하기 위한 첫단계는, 바로 문제가 있단 걸 인식하는 것부터 시작한다고요.\n\n그 const N = 5;

function shuffle(a) {
  const b = [...a];
  for (let i = b.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; }
  return b;
}

function init() {
  selected = shuffle(STIMULI_POOL).slice(0, N);
  respId = Math.random().toString(36).substr(2,8).toUpperCase();
  showIntro();
}

function badgeClass(p) {
  return { 'Facebook':'badge-facebook','Threads':'badge-threads','X(Twitter)':'badge-x','Reddit':'badge-reddit' }[p] || 'badge-facebook';
}

function emotionGrid(prefix) {
  return `<div class="emotion-grid">
    ${EMOTIONS.map(e=>`
      <div class="emotion-option">
        <input type="radio" name="${prefix}" id="${prefix}_${e.id}" value="${e.id}" onchange="updateBtn()">
        <label class="emotion-label" for="${prefix}_${e.id}">
          <span class="em-name">${e.name}</span>
          <span class="em-sub">${e.smemo}</span>
        </label>
      </div>`).join('')}
  </div>`;
}

      ${emotionGrid('eB')}
      <div class="slider-wrap">
        <div class="section-title" style="margin-top:16px;">강도 <span>0 = 전혀 느끼지 않음 / 100 = 매우 강하게 느낌</span></div>
        <div class="slider-row">
          <input type="range" min="0" max="100" value="50" id="sB" oninput="document.getElementById('vB').textContent=this.value">
          <span class="slider-value" id="vB">50</span>
        </div>
        <div class="slider-labels"><span>0</span><span>50</span><span>100</span></div>
      </div>

      <span class="optional-toggle" onclick="toggleOpt(this)">+ 부차적 감정 추가 (선택사항)</span>
      <div class="optional-section" id="optSec">
        <div class="section-title">부차적 감정 <span>(선택)</span></div>
        ${emotionGrid('eC').replace(/onchange="updateBtn\(\)"/g,'')}
        <div class="slider-wrap">
          <div class="section-title" style="margin-top:14px;">부차적 감정 강도</div>
          <div class="slider-row">
            <input type="range" min="0" max="100" value="30" id="sC" oninput="document.getElementById('vC').textContent=this.value">
            <span class="slider-value" id="vC">30</span>
          </div>
          <div class="slider-labels"><span>0</span><span>50</span><span>100</span></div>
        </div>
      </div>
    </div>

    <button class="btn-next" id="btnNext" onclick="save(${idx})" disabled>
      ${idx<N-1 ? '다음 게시글 →' : '과제 완료 ✓'}
    </button>
  `;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toggleOpt(el) {
  const s = document.getElementById('optSec');
  s.classList.toggle('visible');
  el.textContent = s.classList.contains('visible') ? '- 부차적 감정 닫기' : '+ 부차적 감정 추가 (선택사항)';
}
function updateBtn() {
  const a = document.querySelector('input[name=eA]:checked');
  const b = document.querySelector('input[name=eB]:checked');
  document.getElementById('btnNext').disabled = !(a&&b);
}

function save(idx) {
  const post = selected[idx];
  responses.push({
    resp_id: respId,
    post_no: idx+1,
    post_id: post.id,
    platform: post.platform,
    text_preview: post.text.substr(0,60).replace(/\n/g,' '),
    content_emotion: document.querySelector('input[name=eA]:checked')?.value||'',
    content_intensity: document.getElementById('sA')?.value||50,
    own_emotion: document.querySelector('input[name=eB]:checked')?.value||'',
    own_intensity: document.getElementById('sB')?.value||50,
    secondary_emotion: document.querySelector('input[name=eC]:checked')?.value||'',
    secondary_intensity: document.querySelector('input[name=eC]:checked') ? document.getElementById('sC')?.value||'' : '',
  });
  if (idx<N-1) { window.scrollTo(0,0); showQ(idx+1); }
  else showDone();
}

function showDone() {
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('app').innerHTML = `
    <div class="completion">
      <div class="completion-icon">🎉</div>
      <h2>과제 완료!</h2>
      <p>5개의 게시글 평가가 모두 완료되었습니다.<br>
         아래 <strong>완료 코드</strong>를 설문지에 입력해 주십시오.</p>
      <div class="code-box" id="codeBox">${respId}</div>
      <button class="btn-copy" onclick="copyCode()">📋 코드 복사</button>
      <br>
      <span class="download-link" onclick="dlCSV()">📥 응답 결과 내려받기 (CSV)</span>
    </div>
  `;
}
function copyCode() {
  navigator.clipboard.writeText(respId).then(()=>{
    document.querySelector('.btn-copy').textContent='✅ 복사됨!';
    setTimeout(()=>document.querySelector('.btn-copy').textContent='📋 코드 복사',2000);
  });
}
function dlCSV() {
  const h = Object.keys(responses[0]);
  const rows = responses.map(r=>h.map(k=>`"${String(r[k]).replace(/"/g,'""')}"`).join(','));
  const csv = [h.join(','),...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download = `coding_${respId}.csv`;
  a.click();
}
init();
</script>
</body>
</html>
